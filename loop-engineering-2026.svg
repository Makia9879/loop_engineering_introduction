<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1180" viewBox="0 0 1600 1180" role="img" aria-labelledby="title desc">
  <title id="title">Loop Engineering：设计让 AI 自主提示自己的系统循环</title>
  <desc id="desc">展示 Loop Engineering 的核心循环流程与组成组件：Automations、Worktrees、Skills、Connectors、Sub-agents 和 Memory。</desc>

  <defs>
    <marker id="arrow-blue" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#1677a8"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#2f8f6b"/>
    </marker>
    <filter id="soft-shadow" x="-20%" y="-25%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f2433" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="title-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0e5f86"/>
      <stop offset="100%" stop-color="#1c8b66"/>
    </linearGradient>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 800 46px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: url(#title-grad); }
      .subtitle { font: 400 22px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #536171; }
      .section { font: 800 28px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #102f42; }
      .hint { font: 500 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #637284; }
      .step { fill: #ffffff; stroke: #d8e2ec; stroke-width: 2; filter: url(#soft-shadow); }
      .step-title { font: 800 19px Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #122d3f; }
      .step-copy { font: 400 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #405061; }
      .badge-text { font: 800 18px Inter, Arial, sans-serif; fill: #ffffff; }
      .component { fill: #f8fbfd; stroke: #d9e4ed; stroke-width: 2; }
      .component-title { font: 800 19px Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #172637; }
      .component-copy { font: 400 15px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #526273; }
      .arrow-blue { fill: none; stroke: #1677a8; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-blue); }
      .arrow-green { fill: none; stroke: #2f8f6b; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-green); }
      .icon-stroke { fill: none; stroke: #1677a8; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .icon-fill-blue { fill: #1677a8; }
      .icon-fill-green { fill: #2f8f6b; }
      .note-box { fill: #eef8f4; stroke: #b8dfce; stroke-width: 1.5; }
      .note-text { font: 700 15px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #23664d; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1180"/>

  <text class="title" x="90" y="78">Loop Engineering：设计让 AI 自主提示自己的系统循环</text>
  <text class="subtitle" x="90" y="120">
    <tspan x="90" dy="0">用工程化的循环系统驱动 AI：目标、自动化、工作树、技能、子代理和记忆。</tspan>
    <tspan x="90" dy="32">核心是 Automations + Worktrees + Skills + Connectors + Sub-agents + Memory。</tspan>
  </text>

  <text class="section" x="90" y="210">核心循环流程</text>
  <text class="hint" x="300" y="210">循环重点：/goal 可验证停止，worktree 安全并行，Memory 避免 context 退化。</text>

  <g transform="translate(90 250)">
    <path class="arrow-blue" d="M230 88 H304"/>
    <path class="arrow-blue" d="M534 88 H608"/>
    <path class="arrow-blue" d="M838 88 H912"/>
    <path class="arrow-blue" d="M1037 178 V232 H780"/>
    <path class="arrow-blue" d="M550 232 H476"/>
    <path class="arrow-blue" d="M246 232 H130 V178"/>

    <g>
      <rect class="step" x="0" y="0" width="230" height="176" rx="24"/>
      <circle cx="34" cy="36" r="22" class="icon-fill-blue"/>
      <text class="badge-text" x="28" y="43">1</text>
      <text class="step-title" x="68" y="43">Goal / Define</text>
      <text class="step-copy" x="32" y="86">定义目标与停止条件</text>
      <text class="step-copy" x="32" y="114">把成功标准写成</text>
      <text class="step-copy" x="32" y="142">可验证输入、输出、边界</text>
    </g>

    <g transform="translate(304 0)">
      <rect class="step" x="0" y="0" width="230" height="176" rx="24"/>
      <circle cx="34" cy="36" r="22" class="icon-fill-green"/>
      <text class="badge-text" x="28" y="43">2</text>
      <text class="step-title" x="68" y="43">Automations</text>
      <text class="step-copy" x="32" y="86">自动化触发</text>
      <text class="step-copy" x="32" y="114">/loop / /goal / cron</text>
      <text class="step-copy" x="32" y="142">分派任务进入循环</text>
    </g>

    <g transform="translate(608 0)">
      <rect class="step" x="0" y="0" width="230" height="176" rx="24"/>
      <circle cx="34" cy="36" r="22" fill="#1f6f90"/>
      <text class="badge-text" x="28" y="43">3</text>
      <text class="step-title" x="68" y="43">Context / Skills</text>
      <text class="step-copy" x="32" y="86">构建上下文</text>
      <text class="step-copy" x="32" y="114">读取 SKILL.md</text>
      <text class="step-copy" x="32" y="142">约束工具、流程和证据</text>
    </g>

    <g transform="translate(912 0)">
      <rect class="step" x="0" y="0" width="230" height="176" rx="24"/>
      <circle cx="34" cy="36" r="22" fill="#2f8f6b"/>
      <text class="badge-text" x="28" y="43">4</text>
      <text class="step-title" x="68" y="43">Worktrees</text>
      <text class="step-copy" x="32" y="86">使用 Git Worktree</text>
      <text class="step-copy" x="32" y="114">并行执行、隔离改动</text>
      <text class="step-copy" x="32" y="142">降低覆盖风险</text>
    </g>

    <g transform="translate(550 208)">
      <rect class="step" x="0" y="0" width="230" height="176" rx="24"/>
      <circle cx="34" cy="36" r="22" fill="#1677a8"/>
      <text class="badge-text" x="28" y="43">5</text>
      <text class="step-title" x="68" y="43">Sub-agents</text>
      <text class="step-copy" x="32" y="86">Maker + Checker 分工</text>
      <text class="step-copy" x="32" y="114">验证测试、日志、diff</text>
      <text class="step-copy" x="32" y="142">用证据关闭假设</text>
    </g>

    <g transform="translate(246 208)">
      <rect class="step" x="0" y="0" width="230" height="176" rx="24"/>
      <circle cx="34" cy="36" r="22" fill="#2f8f6b"/>
      <text class="badge-text" x="28" y="43">6</text>
      <text class="step-title" x="68" y="43">Deliver / Learn</text>
      <text class="step-copy" x="32" y="86">交付 PR 与验收证据</text>
      <text class="step-copy" x="32" y="114">沉淀经验到 Memory</text>
      <text class="step-copy" x="32" y="142">供下一轮循环复用</text>
    </g>

    <g transform="translate(1180 34)">
      <rect class="note-box" x="0" y="0" width="250" height="118" rx="18"/>
      <text class="note-text" x="22" y="36">2026 实践定义</text>
      <text class="step-copy" x="24" y="68">Prompt 不只是文本</text>
      <text class="step-copy" x="24" y="96">而是可运行工程系统</text>
    </g>
  </g>

  <text class="section" x="90" y="715">组成组件框图</text>

  <g transform="translate(90 755)">
    <path class="arrow-green" d="M300 64 H338"/>
    <path class="arrow-green" d="M638 64 H676"/>
    <path class="arrow-green" d="M976 64 H1014"/>
    <path class="arrow-green" d="M1134 126 V170 H976"/>
    <path class="arrow-green" d="M676 234 H638"/>
    <path class="arrow-green" d="M338 234 H300"/>

    <g>
      <rect class="component" x="0" y="0" width="300" height="128" rx="22"/>
      <circle cx="36" cy="40" r="17" class="icon-fill-blue"/>
      <path class="icon-stroke" d="M28 40 H44 M36 32 V48" stroke="#fff"/>
      <text class="component-title" x="66" y="46">Goal Tracker</text>
      <text class="component-copy" x="34" y="82">目标、停止条件、预算、进展</text>
      <text class="component-copy" x="34" y="108">用可验证标准控制退出</text>
    </g>

    <g transform="translate(338 0)">
      <rect class="component" x="0" y="0" width="300" height="128" rx="22"/>
      <rect x="22" y="23" width="32" height="32" rx="8" fill="#2f8f6b"/>
      <path d="M30 39 H46 M38 31 V47" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <text class="component-title" x="66" y="46">Automations</text>
      <text class="component-copy" x="34" y="82">schedule / /loop / /goal</text>
      <text class="component-copy" x="34" y="108">cron 触发、分派和续跑</text>
    </g>

    <g transform="translate(676 0)">
      <rect class="component" x="0" y="0" width="300" height="128" rx="22"/>
      <circle cx="34" cy="34" r="8" class="icon-fill-blue"/>
      <circle cx="34" cy="64" r="8" class="icon-fill-blue"/>
      <circle cx="54" cy="49" r="8" class="icon-fill-green"/>
      <path class="icon-stroke" d="M34 42 V56 M41 58 L48 53"/>
      <text class="component-title" x="78" y="46">Worktrees</text>
      <text class="component-copy" x="34" y="82">Git 并行隔离</text>
      <text class="component-copy" x="34" y="108">多任务安全执行，减少冲突</text>
    </g>

    <g transform="translate(1014 0)">
      <rect class="component" x="0" y="0" width="300" height="128" rx="22"/>
      <path class="icon-stroke" d="M28 30 H54 V58 H28 Z M34 38 H48 M34 48 H48"/>
      <circle cx="56" cy="66" r="8" class="icon-fill-green"/>
      <text class="component-title" x="78" y="46">Skills &amp; Memory</text>
      <text class="component-copy" x="34" y="82">SKILL.md + 外部状态</text>
      <text class="component-copy" x="34" y="108">避免 context 退化和重复探索</text>
    </g>

    <g transform="translate(676 170)">
      <rect class="component" x="0" y="0" width="300" height="128" rx="22"/>
      <path class="icon-stroke" d="M32 35 V58 M56 35 V58 M32 58 H56 M44 58 V76"/>
      <text class="component-title" x="78" y="46">Connectors / Plugins</text>
      <text class="component-copy" x="84" y="82">MCP 工具集成</text>
      <text class="component-copy" x="84" y="108">连接浏览器、仓库和系统服务</text>
    </g>

    <g transform="translate(338 170)">
      <rect class="component" x="0" y="0" width="300" height="128" rx="22"/>
      <circle cx="34" cy="38" r="13" class="icon-fill-blue"/>
      <circle cx="58" cy="58" r="13" class="icon-fill-green"/>
      <path class="icon-stroke" d="M34 58 C34 78 58 78 58 58"/>
      <text class="component-title" x="78" y="46">Sub-agents &amp; Verifier</text>
      <text class="component-copy" x="84" y="82">实现者 + 验证者</text>
      <text class="component-copy" x="84" y="108">测试、diff、日志、审查证据</text>
    </g>

    <g transform="translate(0 170)">
      <rect class="component" x="0" y="0" width="300" height="128" rx="22"/>
      <path d="M43 25 L65 35 V55 C65 70 55 82 43 88 C31 82 21 70 21 55 V35 Z" fill="#e9f6f1" stroke="#2f8f6b" stroke-width="3"/>
      <path d="M34 56 L41 63 L54 47" fill="none" stroke="#2f8f6b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text class="component-title" x="84" y="46">Human Gate</text>
      <text class="component-copy" x="84" y="82">人类审查、权限确认</text>
      <text class="component-copy" x="84" y="108">处理生产风险与业务决策</text>
    </g>
  </g>

  <g transform="translate(90 1110)">
    <rect x="0" y="-32" width="1420" height="44" rx="14" fill="#f2f8fb" stroke="#d8e8ef"/>
    <text class="hint" x="22" y="-4">关键判断：Loop Engineering 把 AI 放入一个持续闭环中运行：自动化触发、隔离执行、工具连接、验证代理、外部记忆。</text>
  </g>
</svg>
