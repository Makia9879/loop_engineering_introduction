<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">Loop Engineering 第一章流程图预览</title>
  <desc id="desc">白底流程图，展示 Loop Engineering 的六个核心步骤和六个组成组件。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#176b87"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17202a" flood-opacity="0.11"/>
    </filter>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 800 52px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #0f2f3d; }
      .subtitle { font: 400 24px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #5e6978; }
      .section { font: 800 26px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #0f2f3d; }
      .step-box { fill: #ffffff; stroke: #d9dee8; stroke-width: 2; filter: url(#shadow); }
      .step-no { font: 800 22px Inter, Arial, sans-serif; fill: #ffffff; }
      .step-title { font: 800 28px Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #0f2f3d; }
      .step-copy { font: 400 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #344252; }
      .component { fill: #f7f8fb; stroke: #d9dee8; stroke-width: 2; }
      .component-title { font: 800 20px Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #17202a; }
      .component-copy { font: 400 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #5e6978; }
      .loop-line { fill: none; stroke: #176b87; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow); }
      .small-line { fill: none; stroke: #b56b22; stroke-width: 3; stroke-linecap: round; marker-end: url(#arrow); opacity: 0.9; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1000"/>
  <text class="title" x="100" y="105">Loop Engineering 是什么</text>
  <text class="subtitle" x="100" y="150">把需求开发拆成可反复运行的工程循环：目标、上下文、计划、执行、验证、沉淀。</text>

  <text class="section" x="100" y="230">核心步骤</text>

  <g transform="translate(100 270)">
    <path class="loop-line" d="M 250 80 H 325"/>
    <path class="loop-line" d="M 575 80 H 650"/>
    <path class="loop-line" d="M 900 80 H 975"/>
    <path class="loop-line" d="M 1095 185 V 230 H 780"/>
    <path class="loop-line" d="M 530 230 H 455"/>
    <path class="loop-line" d="M 205 230 H 120 V 165"/>

    <g>
      <rect class="step-box" x="0" y="0" width="250" height="160" rx="26"/>
      <circle cx="38" cy="42" r="22" fill="#176b87"/>
      <text class="step-no" x="31" y="50">1</text>
      <text class="step-title" x="74" y="50">Define</text>
      <text class="step-copy" x="32" y="92">把问题转成清晰目标</text>
      <text class="step-copy" x="32" y="121">明确输入、输出、边界</text>
    </g>

    <g transform="translate(325 0)">
      <rect class="step-box" x="0" y="0" width="250" height="160" rx="26"/>
      <circle cx="38" cy="42" r="22" fill="#b56b22"/>
      <text class="step-no" x="31" y="50">2</text>
      <text class="step-title" x="74" y="50">Discover</text>
      <text class="step-copy" x="32" y="92">收集源码、接口、原型</text>
      <text class="step-copy" x="32" y="121">日志、拓扑和历史证据</text>
    </g>

    <g transform="translate(650 0)">
      <rect class="step-box" x="0" y="0" width="250" height="160" rx="26"/>
      <circle cx="38" cy="42" r="22" fill="#53652d"/>
      <text class="step-no" x="31" y="50">3</text>
      <text class="step-title" x="74" y="50">Design</text>
      <text class="step-copy" x="32" y="92">形成最小可行设计</text>
      <text class="step-copy" x="32" y="121">说明数据流与风险</text>
    </g>

    <g transform="translate(975 0)">
      <rect class="step-box" x="0" y="0" width="250" height="160" rx="26"/>
      <circle cx="38" cy="42" r="22" fill="#7b4e9b"/>
      <text class="step-no" x="31" y="50">4</text>
      <text class="step-title" x="74" y="50">Deliver</text>
      <text class="step-copy" x="32" y="92">实现代码、配置迁移</text>
      <text class="step-copy" x="32" y="121">补测试并处理运行问题</text>
    </g>

    <g transform="translate(530 210)">
      <rect class="step-box" x="0" y="0" width="250" height="160" rx="26"/>
      <circle cx="38" cy="42" r="22" fill="#176b87"/>
      <text class="step-no" x="31" y="50">5</text>
      <text class="step-title" x="74" y="50">Verify</text>
      <text class="step-copy" x="32" y="92">用测试、E2E、截图</text>
      <text class="step-copy" x="32" y="121">日志和验收关闭目标</text>
    </g>

    <g transform="translate(205 210)">
      <rect class="step-box" x="0" y="0" width="250" height="160" rx="26"/>
      <circle cx="38" cy="42" r="22" fill="#b56b22"/>
      <text class="step-no" x="31" y="50">6</text>
      <text class="step-title" x="74" y="50">Learn</text>
      <text class="step-copy" x="32" y="92">把踩坑、约定、路径</text>
      <text class="step-copy" x="32" y="121">写回知识库或交接文档</text>
    </g>
  </g>

  <text class="section" x="100" y="720">组成组件</text>

  <g transform="translate(100 760)">
    <path class="small-line" d="M 360 56 H 400"/>
    <path class="small-line" d="M 760 56 H 800"/>
    <path class="small-line" d="M 980 112 V 150"/>
    <path class="small-line" d="M 400 214 H 360"/>
    <path class="small-line" d="M 800 214 H 760"/>

    <g>
      <rect class="component" x="0" y="0" width="360" height="112" rx="22"/>
      <text class="component-title" x="24" y="40">Goal Tracker</text>
      <text class="component-copy" x="24" y="72">记录目标、预算</text>
      <text class="component-copy" x="24" y="96">进展和阻塞</text>
    </g>

    <g transform="translate(400 0)">
      <rect class="component" x="0" y="0" width="360" height="112" rx="22"/>
      <text class="component-title" x="24" y="40">Context Builder</text>
      <text class="component-copy" x="24" y="72">构建可验证</text>
      <text class="component-copy" x="24" y="96">项目上下文</text>
    </g>

    <g transform="translate(800 0)">
      <rect class="component" x="0" y="0" width="360" height="112" rx="22"/>
      <text class="component-title" x="24" y="40">Executor</text>
      <text class="component-copy" x="24" y="72">编码、命令执行</text>
      <text class="component-copy" x="24" y="96">远程操作与联调</text>
    </g>

    <g transform="translate(800 158)">
      <rect class="component" x="0" y="0" width="360" height="112" rx="22"/>
      <text class="component-title" x="24" y="40">Verifier</text>
      <text class="component-copy" x="24" y="72">测试、E2E</text>
      <text class="component-copy" x="24" y="96">截图和日志检查</text>
    </g>

    <g transform="translate(400 158)">
      <rect class="component" x="0" y="0" width="360" height="112" rx="22"/>
      <text class="component-title" x="24" y="40">Memory Keeper</text>
      <text class="component-copy" x="24" y="72">维护经验库</text>
      <text class="component-copy" x="24" y="96">和下一轮入口</text>
    </g>

    <g transform="translate(0 158)">
      <rect class="component" x="0" y="0" width="360" height="112" rx="22"/>
      <text class="component-title" x="24" y="40">Human Gate</text>
      <text class="component-copy" x="24" y="72">处理权限、风险</text>
      <text class="component-copy" x="24" y="96">和业务判断</text>
    </g>
  </g>
</svg>
